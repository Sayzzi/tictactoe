<h2>Let's play tictac toe </h2>


<main>

    <div ngClass="board">
        @for (item of board(); track $index) {
        <div class="cell" [ngClass]="{ 'cross': item === 'X', 'circle': item === 'O' }" (click)="play($index)">
        </div>
        }
    </div>

    @if (winner()) {
    <p>{{ winner() }} won</p>
    }
</main>
