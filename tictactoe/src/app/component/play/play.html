<h2>Let's play tictac toe </h2>
<main>
    @if (gameStarted()) {
    <div class="board" [style.--cells]="size()">
        @for (item of board(); track $index) {
        <div class="cell" [ngClass]="{ 'cross': item === 'X', 'circle': item === 'O' }" (click)="play($index)">
        </div>
        }
    </div>
    @if (winner()) {
    <p>{{ winner() }} won</p>
    } @else if (isDraw()) {
    <p>Game is draw</p>
    }

    @if (winner() || isDraw()) {
    <button (click)="reset()">Play again</button>
    }



    } @else {
    <button (click)="chooseSymbol('X')">Play ❌</button>
    <button (click)="chooseSymbol('O')">Play ⭕</button>
    }
</main>
